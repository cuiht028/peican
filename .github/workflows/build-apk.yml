name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet
        run: pip install flet==0.86.1

      - name: Build APK
        run: |
          flet build apk \
            --yes \
            --skip-flutter-doctor \
            --project peican \
            --artifact peican \
            --org com.qclaw \
            --product "家庭四季养生配餐" \
            --build-number ${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: peican-apk
          path: build/apk/*.apk
          retention-days: 30
